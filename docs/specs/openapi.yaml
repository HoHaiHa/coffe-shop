components:
  schemas:
    Brand:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    CartItemRequest:
      type: object
      required:
        - Quantity
        - ProductItemId
        - UserId
      properties:
        Quantity:
          type: integer
          format: int32
        ProductItemId:
          type: integer
          format: int64
        UserId:
          type: integer
          format: int64
      description: CartItemRequest — payload/request/CartItemRequest.java
    CartItemResponse:
      type: object
      required:
        - id
        - product_item
        - quantity
        - user_id
      properties:
        id:
          type: integer
          format: int64
        product_item:
          $ref: '#/components/schemas/ProductItemResponse'
        quantity:
          type: integer
          format: int32
        user_id:
          type: integer
          format: int64
      description: CartItemResponse — payload/response/CartItemResponse.java
    Category:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/Status'
    ChatMessageRequest:
      type: object
      required:
        - senderId
        - content
        - conversationId
      properties:
        senderId:
          type: integer
          format: int64
        content:
          type: string
        conversationId:
          type: integer
          format: int64
      description: ChatMessageRequest — payload/request/ChatMessageRequest.java
    ChatMessageResponse:
      type: object
      required:
        - id
        - senderId
        - senderName
        - content
      properties:
        id:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        senderName:
          type: string
